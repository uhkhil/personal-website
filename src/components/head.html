<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}" />
  <meta name="author" content="Akhil Kumar" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:url" content="https://akhil-kumar.com{{ url }}" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="Akhil Kumar" />
  <meta property="og:image" content="https://akhil-kumar.com/banner.webp" />
  <meta property="og:image:alt" content="Akhil Kumar's portfolio website preview" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="https://akhil-kumar.com/banner.webp" />
  <meta name="twitter:creator" content="@uhkhil" />
  <meta name="twitter:site" content="@uhkhil" />

  <!-- Canonical -->
  <link rel="canonical" href="https://akhil-kumar.com{{ url }}" />

  <!-- Favicons -->
  <link rel="icon" href="/favicons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/favicons/site.webmanifest" />
  <link href="/src/index.css" rel="stylesheet" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Akhil Kumar",
      "url": "https://akhil-kumar.com",
      "email": "akhilnareshkumar@gmail.com",
      "jobTitle": "Full Stack Developer",
      "sameAs": ["https://github.com/uhkhil", "https://linkedin.com/in/akhil-n-kumar"]
    }
  </script>

  <script
    defer
    src="https://cloud.umami.is/script.js"
    data-website-id="c0b7d464-c58e-4856-bb55-69967142efb2"
  ></script>
</head>
