<!doctype html>
<html lang="en">
  {{> head title=meta.experience.title description=meta.experience.description
  url=meta.experience.url }}

  <body class="bg-black text-zinc-100 font-sans antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    {{> header }}

    <!-- Main Content -->
    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full">
      <section class="animate-fade-in-up">
        <header class="mb-12">
          <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-4 text-white">
            Work Experience
          </h1>
          <p class="text-lg text-zinc-400">A timeline of my professional journey.</p>
        </header>

        <div class="space-y-16">{{#each experiences}} {{> experience-item this}} {{/each}}</div>
        <br />
      </section>
    </main>

    <!-- Footer -->
    {{> footer }}
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
